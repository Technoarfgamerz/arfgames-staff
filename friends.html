<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARFGAMES STAFF</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:linear-gradient(135deg,#0d1117,#161b22);
color:white;
min-height:100vh;
}

header{
background:#00ff88;
padding:20px;
text-align:center;
color:black;
font-size:30px;
font-weight:bold;
}

.container{
padding:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:15px;
border:3px solid #00ff88;
transition:.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff88;
}

button{
margin-top:30px;
padding:15px 30px;
background:#00ff88;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00cc66;
}
</style>

</head>

<body>

<header>
🎮 ARFGAMES STAFF
</header>

<div class="container">

<h2>📸 CW Photos</h2>

<div class="gallery">

<img src="images/cw1.jpg">
<img src="images/cw2.jpg">
<img src="images/cw3.jpg">
<img src="images/cw4.jpg">

</div>

<button id="logoutBtn">Logout</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyAyTw1czFX8uR4rnJOP7cVxCr55_nhOHG0",
authDomain:"arfgames-staff.firebaseapp.com",
projectId:"arfgames-staff",
storageBucket:"arfgames-staff.firebasestorage.app",
messagingSenderId:"705112766623",
appId:"1:705112766623:web:455c3c3b2f14c37b5b4aaa"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="index.html";
}
});

document.getElementById("logoutBtn").onclick=()=>{
signOut(auth).then(()=>{
window.location.href="index.html";
});
};

</script>

</body>
</html>
