<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARFGAMES STAFF LOGIN</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#111827;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:350px;
      background:#1f2937;
      padding:25px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,.5);
    }

    h1{
      color:#00ff99;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#00ff99;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#00cc77;
    }
  </style>
</head>

<body>

<div class="box">
<h1>ARFGAMES STAFF</h1>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
