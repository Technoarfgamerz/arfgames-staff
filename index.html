<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARFGAMES STAFF LOGIN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:url("images/background.jpg") no-repeat center center fixed;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.65);
}

.login-box{

position:relative;
z-index:10;

width:370px;

background:rgba(20,20,20,.65);

backdrop-filter:blur(12px);

padding:35px;

border-radius:20px;

border:2px solid #00ff88;

box-shadow:0 0 30px #00ff88;

text-align:center;

animation:fade 1s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{

font-size:45px;

margin-bottom:10px;

}

h1{

color:#00ff88;

margin-bottom:10px;

}

.subtitle{

color:#ddd;

margin-bottom:30px;

font-size:14px;

}

input{

width:100%;

padding:15px;

margin:10px 0;

border:none;

border-radius:10px;

font-size:16px;

outline:none;

}

button{

width:100%;

padding:15px;

margin-top:20px;

background:#00ff88;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#00cc66;

box-shadow:0 0 20px #00ff88;

}

.footer{

margin-top:25px;

font-size:12px;

color:#aaa;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">🎮</div>

<h1>ARFGAMES STAFF</h1>

<p class="subtitle">
Authorized Members Only
</p>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button id="loginBtn">

LOGIN

</button>

<p class="footer">

© 2026 ARFGAMES

</p>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
